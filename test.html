<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Product Filters</title>
    <style>
        .container {
    display: flex;
}

.sidebar {
    width: 200px;
    padding: 10px;
    border-right: 1px solid #ccc;
}

#filterButton {
    display: block;
    margin-bottom: 10px;
}

#filterMenu {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease-out;
    background-color: #f9f9f9;
    border: 1px solid #ccc;
    padding: 0 10px;
}

#filterMenu.expanded {
    max-height: 200px; /* Достаточная высота для размещения всех фильтров */
}

.content {
    flex: 1;
    padding: 20px;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <button id="filterButton">Фильтры</button>
            <div id="filterMenu" class="hidden">
                <h2>Фильтры</h2>
                <label>
                    <input type="checkbox" name="category" value="electronics"> Электроника
                </label><br>
                <label>
                    <input type="checkbox" name="category" value="clothing"> Одежда
                </label><br>
                <label>
                    <input type="checkbox" name="category" value="home"> Дом
                </label><br>
                <button id="applyFilters">Применить</button>
            </div>
        </div>
        <div class="content">
            <!-- Основной контент страницы -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
<script>
    document.getElementById('filterButton').addEventListener('click', function() {
    var filterMenu = document.getElementById('filterMenu');
    if (filterMenu.classList.contains('expanded')) {
        filterMenu.classList.remove('expanded');
    } else {
        filterMenu.classList.add('expanded');
    }
});
</script>
</html>
